name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk unzip git zip libltdl-dev libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython

    - name: Initialize Buildozer Spec
      run: |
        buildozer init
        sed -i 's/^requirements = .*/requirements = python3,kivy,requests,beautifulsoup4/' buildozer.spec
        sed -i 's/#android.api =.*/android.api = 33/' buildozer.spec
        sed -i 's/#android.minapi =.*/android.minapi = 21/' buildozer.spec
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec

    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk
        
