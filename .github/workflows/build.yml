name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk unzip git zip libltdl-dev libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython

    - name: Initialize Buildozer Spec
      run: |
        buildozer init
        sed -i 's/^requirements = .*/requirements = python3,kivy,requests,beautifulsoup4/' buildozer.spec
        sed -i 's/#android.api =.*/android.api = 33/' buildozer.spec
        sed -i 's/#android.minapi =.*/android.minapi = 21/' buildozer.spec
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec

    - name: Force Install Android SDK & Build-Tools (Fixes aidl)
      run: |
        ANDROID_SDK_ROOT="/home/runner/.buildozer/android/platform/android-sdk"
        mkdir -p $ANDROID_SDK_ROOT
        
        # Command-line tools endirik
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477336_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
        mv cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/ || true
        rm -rf cmdline-tools.zip cmdline-tools

        # Lisenziyaları qəbul edib build-tools və aidl-i quraşdırırıq
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk
        
